name: 'coverage'
on:
    pull_request:
        branches:
            - master
            - main
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
    coverage:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ArtiomTr/jest-coverage-report-action@v2