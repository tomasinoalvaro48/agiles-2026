name: 'coverage'
on:
    pull_request:
        branches:
            - master
            - main
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
    coverage:
        runs-on: ubuntu-latest
        steps:
            - name: Setup Pages
              uses: actions/configure-pages@v4
              
            - name: Upload HTML Report Artifact
              uses: actions/upload-pages-artifact@v3
              with:
                path: 'coverage/index.html' # Path to HTML report directory

            - name: Deploy to GitHub Pages
              uses: actions/deploy-pages@v4